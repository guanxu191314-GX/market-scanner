name: Daily Market Scan100

on:
  schedule:
    # Runs at 21:00 UTC (4:00 PM EST - End of US Market) Monday through Friday
    - cron: '0 21 * * 1-5'
  workflow_dispatch: 

# THIS IS THE FIX: Forces GitHub to use the updated Node 24 environment
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Market Scan Script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python market_scan.py
